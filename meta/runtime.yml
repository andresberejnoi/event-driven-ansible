---
# https://access.redhat.com/support/policy/updates/ansible-automation-platform
# https://docs.ansible.com/ansible/latest/reference_appendices/release_and_maintenance.html#ansible-core-support-matrix
requires_ansible: ">=2.15.0" # AAP 2.4 or newer
action_groups:
  eda:
    - activation
    - activation_info
    - controller_token
    - credential
    - credential_info
    - credential_input_source
    - credential_input_source_info
    - credential_type
    - credential_type_info
    - decision_environment
    - decision_environment_info
    - event_stream
    - event_stream_info
    - project
    - project_info
    - rulebook_info
    - rulebook_activation
    - rulebook_activation_copy
    - rulebook_activation_info
    - user
plugin_routing:
  modules:
    activation:
      redirect: ansible.eda.rulebook_activation
      deprecation:
        removal_version: 4.0.0
        warning_text: >-
          activation has been renamed to rulebook_activation.
          Please update your tasks.
    activation_info:
      redirect: ansible.eda.rulebook_activation_info
      deprecation:
        removal_version: 4.0.0
        warning_text: >-
          activation_info has been renamed to rulebook_activation_info.
          Please update your tasks.
  extensions.eda.plugins.event_filter:
    ansible.eda.json_filter:
      redirect: eda.builtin.json_filter
      deprecation:
        removal_version: 5.0.0
        warning_text: >-
          ansible.eda.json_filter has moved to a builtin.
          Please update your rulebook to use eda.builtin.json_filter.
    ansible.eda.normalize_keys:
      redirect: eda.builtin.normalize_keys
      deprecation:
        removal_version: 5.0.0
        warning_text: >-
          ansible.eda.normalize_keys filter has moved to a builtin.
          Please update your rulebook to use eda.builtin.normalize_keys
    ansible.eda.dashes_to_underscores:
      redirect: eda.builtin.dashes_to_underscores
      deprecation:
        removal_version: 5.0.0
        warning_text: >-
          ansible.eda.dashes_to_underscores filter has moved to a builtin.
          Please update your rulebook to use eda.builtin.dashes_to_underscores.
  extensions.eda.plugins.event_source:
    ansible.eda.pg_listener:
      redirect: eda.builtin.pg_listener
      deprecation:
        removal_version: 5.0.0
        warning_text: >-
          ansible.eda.pg_listener has moved to a builtin.
          Please update your rulebook to use eda.builtin.pg_listener.
    ansible.eda.generic:
      redirect: eda.builtin.generic
      deprecation:
        removal_version: 5.0.0
        warning_text: >-
          ansible.eda.generic has moved to a builtin.
          Please update your rulebook to use eda.builtin.generic.
    ansible.eda.range:
      redirect: eda.builtin.range
      deprecation:
        removal_version: 5.0.0
        warning_text: >-
          ansible.eda.range has moved to a builtin.
          Please update your rulebook to use eda.builtin.range.